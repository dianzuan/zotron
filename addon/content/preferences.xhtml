<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
     xmlns:html="http://www.w3.org/1999/xhtml">

<groupbox>
  <label><html:h2>OCR 设置</html:h2></label>
  <hbox align="center">
    <label value="OCR 引擎:" style="width: 80px;" />
    <menulist id="zotron-ocr-provider" preference="ocr.provider">
      <menupopup>
        <menuitem label="智谱 GLM-OCR" value="glm" />
        <menuitem label="阿里通义千问 Qwen-VL-OCR" value="qwen" />
        <menuitem label="自定义" value="custom" />
      </menupopup>
    </menulist>
  </hbox>
  <hbox align="center">
    <label value="API Key:" style="width: 80px;" />
    <html:input id="zotron-ocr-apikey" type="password"
                preference="ocr.apiKey" placeholder="填入 API Key"
                style="flex: 1;"></html:input>
    <button id="zotron-ocr-test" label="测试" />
  </hbox>
  <html:p id="zotron-ocr-status" style="font-size: 11px; color: #888; margin: 2px 0 0 84px;"></html:p>
  <hbox align="center">
    <label value="模型:" style="width: 80px;" />
    <html:input id="zotron-ocr-model" type="text"
                preference="ocr.model" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
  <hbox align="center">
    <label value="API URL:" style="width: 80px;" />
    <html:input id="zotron-ocr-apiurl" type="text"
                preference="ocr.apiUrl" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
</groupbox>

<groupbox>
  <label><html:h2>Embedding 设置</html:h2></label>
  <hbox align="center">
    <label value="引擎:" style="width: 80px;" />
    <menulist id="zotron-emb-provider" preference="embedding.provider">
      <menupopup>
        <menuitem label="Ollama 本地" value="ollama" />
        <menuitem label="智谱" value="zhipu" />
        <menuitem label="阿里通义千问 DashScope" value="dashscope" />
        <menuitem label="字节豆包" value="doubao" />
        <menuitem label="OpenAI" value="openai" />
      </menupopup>
    </menulist>
  </hbox>
  <hbox align="center">
    <label value="API Key:" style="width: 80px;" />
    <html:input id="zotron-emb-apikey" type="password"
                preference="embedding.apiKey" placeholder="Ollama 本地无需填写"
                style="flex: 1;"></html:input>
    <button id="zotron-emb-test" label="测试" />
  </hbox>
  <html:p id="zotron-emb-status" style="font-size: 11px; color: #888; margin: 2px 0 0 84px;"></html:p>
  <hbox align="center">
    <label value="模型:" style="width: 80px;" />
    <html:input id="zotron-emb-model" type="text"
                preference="embedding.model" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
  <hbox align="center">
    <label value="API URL:" style="width: 80px;" />
    <html:input id="zotron-emb-apiurl" type="text"
                preference="embedding.apiUrl" readonly="readonly"
                style="flex: 1; color: #888;"></html:input>
  </hbox>
</groupbox>

</vbox>
